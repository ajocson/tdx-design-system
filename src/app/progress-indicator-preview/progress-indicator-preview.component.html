<main class="tdx-progress-bar-preview">
  <section class="tdx-progress-bar-preview__theme" data-theme="light">
    <header class="tdx-progress-bar-preview__header">
      <h1>Progress Bar Playground</h1>
      <p>Light mode</p>
    </header>

    <ng-container *ngTemplateOutlet="progressBarExamples"></ng-container>
  </section>

  <section class="tdx-progress-bar-preview__theme" data-theme="dark">
    <header class="tdx-progress-bar-preview__header">
      <h1>Progress Bar Playground</h1>
      <p>Dark mode</p>
    </header>

    <ng-container *ngTemplateOutlet="progressBarExamples"></ng-container>
  </section>

  <ng-template #progressBarExamples>
    <div class="tdx-progress-bar-preview__examples">
      <section *ngFor="let progressBar of progressBars" class="tdx-progress-bar-preview__section">
        <h2>{{ progressBar.label }}</h2>
        <tdx-progress-bar
          [ariaLabel]="progressBar.label + ' loading progress'"
          [progress]="progress"
          [variant]="progressBar.variant">
        </tdx-progress-bar>
      </section>
    </div>
  </ng-template>
</main>

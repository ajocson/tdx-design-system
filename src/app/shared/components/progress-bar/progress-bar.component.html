<div
  class="tdx-progress-bar"
  [ngClass]="progressBarClasses"
  role="progressbar"
  [attr.aria-label]="ariaLabel"
  aria-valuemin="0"
  aria-valuemax="100"
  [attr.aria-valuenow]="progress"
  [attr.aria-valuetext]="ariaValueText || null">
  <span class="tdx-progress-bar__fill" [style.width.%]="progress"></span>
</div>
